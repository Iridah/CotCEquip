{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CotC Equip{% endblock %}</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- Estilos propios -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="{% static 'js/charts.js' %}"></script>

    {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top shadow">
    <div class="container-fluid px-4">
        <a class="navbar-brand octo-font fw-bold" href="/">
            CotC <span class="text-white">EQUIP</span> <span class="text-gold">II</span>
        </a>

        <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Roster</a></li>
            </ul>

            <!-- Contador global -->
            <!-- <div class="d-flex align-items-center gap-3">
                <div class="text-center">
                    <div class="text-gold fw-bold fs-5" id="contador-reclutados">—</div>
                    <div style="font-size:0.6rem; letter-spacing:2px; text-transform:uppercase; color:var(--octo-muted);">Reclutados</div>
                </div>
                <div class="text-muted">/</div>
                <div class="text-center">
                    <div class="fw-bold fs-5 text-white" id="contador-reconocidos">—</div>
                    <div style="font-size:0.6rem; letter-spacing:2px; text-transform:uppercase; color:var(--octo-muted);">Reconocidos</div>
                </div>
            </div> -->
        </div>
    </div>
</nav>

<main class="container-fluid px-4 mt-4">
    {% block content %}{% endblock %}
</main>

<footer class="text-center py-4 mt-5" style="border-top: 1px solid var(--octo-border);">
    <p class="octo-font mb-0" style="font-size:0.7rem; color:var(--octo-muted); letter-spacing:2px;">
        CotC EQUIP II · Octopath Traveler: Champions of the Continent
    </p>
</footer>

{% block extra_js %}{% endblock %}
</body>
</html>
