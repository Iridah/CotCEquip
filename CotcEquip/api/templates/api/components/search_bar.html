<div class="octo-panel p-3 mb-4">
    <div class="row g-2 align-items-center">

        <!-- Búsqueda por nombre -->
        <div class="col-12 col-md-3">
            <div class="input-group">
                <span class="input-group-text">🔍</span>
                <input
                    type="text"
                    class="form-control octo-input"
                    placeholder="Busca a tu traveler..."
                    hx-get="/roster/search/"
                    hx-trigger="keyup changed delay:300ms"
                    hx-target="#traveler-grid"
                    hx-include="[name='job'],[name='weapon'],[name='element'],[name='solo_reclutados']"
                    name="q"
                >
            </div>
        </div>

        <!-- Filtro por Job -->
        <div class="col-6 col-md-2">
            <select
                class="form-select octo-input"
                name="job"
                hx-get="/roster/search/"
                hx-trigger="change"
                hx-target="#traveler-grid"
                hx-include="[name='q'],[name='weapon'],[name='element'],[name='solo_reclutados']"
            >
                <option value="">Todas las clases</option>
                {% for job in jobs %}
                <option value="{{ job }}">{{ job }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Filtro por Arma -->
        <div class="col-6 col-md-2">
            <select
                class="form-select octo-input"
                name="weapon"
                hx-get="/roster/search/"
                hx-trigger="change"
                hx-target="#traveler-grid"
                hx-include="[name='q'],[name='job'],[name='element'],[name='solo_reclutados']"
            >
                <option value="">Todas las armas</option>
                {% for arma in armas %}
                <option value="{{ arma }}">{{ arma }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Filtro por Elemento -->
        <div class="col-6 col-md-2">
            <select
                class="form-select octo-input"
                name="element"
                hx-get="/roster/search/"
                hx-trigger="change"
                hx-target="#traveler-grid"
                hx-include="[name='q'],[name='job'],[name='weapon'],[name='solo_reclutados']"
            >
                <option value="">Todos los elementos</option>
                {% for elemento in elementos %}
                <option value="{{ elemento }}">{{ elemento }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Toggle solo reclutados -->
        <div class="col-6 col-md-3 d-flex align-items-center justify-content-center gap-2">
            <div class="form-check form-switch">
                <input
                    class="form-check-input"
                    type="checkbox"
                    role="switch"
                    id="soloReclutados"
                    name="solo_reclutados"
                    value="1"
                    hx-get="/roster/search/"
                    hx-trigger="change"
                    hx-target="#traveler-grid"
                    hx-include="[name='q'],[name='job'],[name='weapon'],[name='element']"
                >
                <label class="form-check-label" for="soloReclutados">Solo míos</label>
            </div>
        </div>

    </div>
</div>
